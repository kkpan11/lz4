version: 1.0.{build}

# Test matrix: different compilers and platforms
environment:
  matrix:
    - COMPILER: gcc
      PLATFORM: mingw32
    - COMPILER: gcc  
      PLATFORM: mingw64
    - COMPILER: clang
      PLATFORM: mingw64
    - COMPILER: visual
      PLATFORM: Win32
      CONFIGURATION: Debug
    - COMPILER: visual
      PLATFORM: Win32
      CONFIGURATION: Release
    - COMPILER: visual
      PLATFORM: x64
      CONFIGURATION: Release

install:
  - echo Installing %COMPILER% %PLATFORM% %CONFIGURATION%
  - mkdir bin
  # Setup MinGW environment for GCC/Clang
  - if not [%COMPILER%]==[visual] set "PATH_MINGW32=c:\MinGW\bin;c:\MinGW\usr\bin"
  - if not [%COMPILER%]==[visual] set "PATH_MINGW64=c:\msys64\mingw64\bin;c:\msys64\usr\bin"
  - if not [%COMPILER%]==[visual] copy C:\MinGW\bin\mingw32-make.exe C:\MinGW\bin\make.exe >nul 2>&1
  - if not [%COMPILER%]==[visual] copy C:\MinGW\bin\gcc.exe C:\MinGW\bin\cc.exe >nul 2>&1
  # Setup Visual Studio x64 library paths
  - if [%COMPILER%]==[visual] if [%PLATFORM%]==[x64] set "ADDITIONALPARAM=/p:LibraryPath=C:\Program Files\Microsoft SDKs\Windows\v7.1\lib\x64;c:\Program Files (x86)\Microsoft Visual Studio 10.0\VC\lib\amd64;C:\Program Files (x86)\Microsoft Visual Studio 10.0\;C:\Program Files (x86)\Microsoft Visual Studio 10.0\lib\amd64;"

build_script:
  - echo "*** Building %COMPILER% %PLATFORM% %CONFIGURATION% ***"
  # Configure PATH for MinGW builds
  - if [%PLATFORM%]==[mingw32] set PATH=%PATH_MINGW32%;%PATH%
  - if [%PLATFORM%]==[mingw64] set PATH=%PATH_MINGW64%;%PATH%
  
  # GCC Build
  - if [%COMPILER%]==[gcc] (
      echo "GCC build started" &&
      gcc -v &&
      make -v &&
      make -j -C programs lz4 V=1 &&
      make -j -C tests fullbench V=1 &&
      make -j -C tests fuzzer V=1 &&
      make -j -C lib lib V=1 &&
      echo "Packaging GCC build..." &&
      mkdir bin\dll bin\static bin\example bin\include &&
      copy tests\fullbench.c bin\example\ &&
      copy lib\xxhash.* bin\example\ &&
      copy lib\lz4*.h bin\include\ &&
      copy lib\liblz4.a bin\static\liblz4_static.lib &&
      copy lib\liblz4.dll* bin\dll\ >nul 2>&1 &&
      copy lib\dll\example\* bin\example\ >nul 2>&1 &&
      copy programs\lz4.exe bin\lz4.exe &&
      copy tests\*.exe programs\
    )
  
  # Clang Build  
  - if [%COMPILER%]==[clang] (
      echo "Clang build started" &&
      clang -v &&
      make -v &&
      set "CFLAGS=--target=x86_64-w64-mingw32 -Werror -Wconversion -Wno-sign-conversion" &&
      make -j -C programs lz4 CC=clang V=1 &&
      make -j -C tests fullbench CC=clang V=1 &&
      make -j -C tests fuzzer CC=clang V=1 &&
      make -j -C lib lib CC=clang V=1 &&
      copy tests\*.exe programs\
    )
  
  # Visual Studio Build
  - if [%COMPILER%]==[visual] (
      echo "Visual Studio build started" &&
      set "MSBUILD_COMMON=/m /verbosity:minimal /property:Optimize=false /t:Clean,Build /p:Platform=%PLATFORM% /p:Configuration=%CONFIGURATION% /logger:C:\Program Files\AppVeyor\BuildAgent\Appveyor.MSBuildLogger.dll" &&
      msbuild "build\VS2022\lz4.sln" %MSBUILD_COMMON% /property:PlatformToolset=v110 &&
      msbuild "build\VS2022\lz4.sln" %MSBUILD_COMMON% /property:PlatformToolset=v120 &&
      copy build\VS2022\bin\%PLATFORM%_%CONFIGURATION%\*.exe programs\
    )
  
  # Create release archives (GCC only)
  - if [%COMPILER%]==[gcc] if [%PLATFORM%]==[mingw64] 7z.exe a -bb1 bin\lz4_x64.zip NEWS .\bin\lz4.exe README.md .\bin\example .\bin\dll .\bin\static .\bin\include
  - if [%COMPILER%]==[gcc] if [%PLATFORM%]==[mingw64] appveyor PushArtifact bin\lz4_x64.zip
  - if [%COMPILER%]==[gcc] if [%PLATFORM%]==[mingw32] 7z.exe a -bb1 bin\lz4_x86.zip NEWS .\bin\lz4.exe README.md .\bin\example .\bin\dll .\bin\static .\bin\include
  - if [%COMPILER%]==[gcc] if [%PLATFORM%]==[mingw32] appveyor PushArtifact bin\lz4_x86.zip

test_script:
  - echo "*** Testing %COMPILER% %PLATFORM% %CONFIGURATION% ***"
  - cd programs
  - lz4 -h
  - lz4 -i1b lz4.exe
  - lz4 -i1b5 lz4.exe
  - lz4 -i1b10 lz4.exe
  - lz4 -i1b15 lz4.exe
  - echo "------- lz4 tested -------"
  - fullbench.exe -i0 fullbench.exe
  - echo "Launching fuzzer test..."
  - fuzzer.exe -v -T20s
  - cd ..

artifacts:
  - path: bin\lz4_x64.zip
    name: LZ4 Windows x64 Build
  - path: bin\lz4_x86.zip  
    name: LZ4 Windows x86 Build
